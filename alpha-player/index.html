F<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Secure Management Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#060913] text-slate-200 min-h-screen font-sans flex items-center justify-center p-4">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 w-full max-w-sm px-4"></div>

    <main class="w-full max-w-md bg-[#0b101f] border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl space-y-6">
        <div class="text-center">
            <!-- ضع هذا الكود مكانه -->
     <div class="w-16 h-16 rounded-xl mx-auto mb-4 overflow-hidden shadow-lg border border-slate-700">
    <img src="image/logo.jpg.jpg" alt="Logo" class="w-full h-full object-cover">
</div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-cyan-400 tracking-wider">ALPHA CORE</h1>
            <p class="text-xs text-slate-400 mt-2">Portail d'administration sécurisé - بوابات الإدارة المحمية</p>
        </div>

        <div class="space-y-4 text-xs font-bold">
            <div>
                <label class="text-slate-400 block mb-1.5 text-left">Nom d'utilisateur (الاسم)</label>
                <input type="text" id="auth-username" placeholder="fethi" class="w-full p-3.5 rounded-xl bg-[#04060c] border border-slate-800 text-white font-mono focus:outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="text-slate-400 block mb-1.5 text-left">Mot de passe (كلمة المرور)</label>
                <input type="password" id="auth-password" placeholder="••••••••" class="w-full p-3.5 rounded-xl bg-[#04060c] border border-slate-800 text-white font-mono focus:outline-none focus:border-cyan-500">
            </div>
            <button onclick="handleAdminSystemAuth()" class="w-full bg-gradient-to-r from-rose-500 to-cyan-500 hover:from-rose-600 hover:to-cyan-600 text-slate-950 font-black p-4 rounded-xl transition-all cursor-pointer shadow-lg text-sm uppercase tracking-wider">
                Connexion Système
            </button>
        </div>
    </main>

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";

        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `p-3 rounded-xl shadow-2xl border text-xs font-bold text-slate-950 flex items-center gap-2 ${type === 'success' ? 'bg-emerald-400 border-emerald-500' : 'bg-rose-400 border-rose-500'}`;
            toast.innerHTML = type === 'success' ? `✅ ${message}` : `❌ ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

      async function handleAdminSystemAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    
    if(!username || !password) return showNotification('Veuillez remplir tous les champs !', 'error');

    // إضافة مؤشر انتظار - يظهر للاعب أن العملية بدأت
    showNotification('Connexion en cours...', 'success');

    try {
        const res = await fetch(`${BACKEND_URL}/api/login`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ username, password }) 
        });
        
        const data = await res.json();
        
        if (res.ok) {
            if(data.role === 'player') {
                return showNotification('Accès refusé. Vous n\'êtes pas un membre de l\'administration !', 'error');
            }

            // حفظ بيانات المستخدم
            localStorage.setItem('alpha_user', JSON.stringify(data));
            localStorage.setItem('token', data.access_token); 
            
            showNotification('Authentification réussie ! Redirection...');

            setTimeout(() => {
                if (data.username === 'fethi' || data.role === 'owner') {
                    window.location.href = 'owner.html'; 
                } else if (data.role === 'super_admin') {
                    window.location.href = 'super_admin.html';
                } else if (data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else if (data.role === 'shop') {
                    window.location.href = 'shop.html';
                }
            }, 800);

        } else { 
            showNotification(data.detail || 'Identifiants incorrects !', 'error'); 
        }
    } catch(e){ 
        showNotification('Erreur de communication avec le serveur', 'error'); 
    }
}
        
    </script>
</body>
</html>
